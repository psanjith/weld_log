<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weld & NDE Log - Interactive Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.2em;
            color: #1a365d;
            margin-bottom: 8px;
            font-weight: 700;
        }

        header p {
            font-size: 1em;
            color: #718096;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        .panel {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 35px;
            border: 1px solid #e2e8f0;
        }

        .panel h2 {
            color: #1a365d;
            margin-bottom: 25px;
            font-size: 1.35em;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2d3748;
            font-weight: 500;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
            transition: all 0.2s;
            background: #fff;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .text-input {
            flex: 1;
        }

        .file-upload {
            flex-shrink: 0;
        }

        .form-group input[type="file"] {
            padding: 6px 10px;
            font-size: 0.85em;
            cursor: pointer;
        }

        .file-name {
            font-size: 0.85em;
            color: #48bb78;
            margin-top: 4px;
            margin-left: 8px;
        }

        .grid-container {
            overflow-x: auto;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        th {
            background: #ffd700;
            color: #1a365d;
            padding: 14px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e6b800;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid #e2e8f0;
            color: #2d3748;
        }

        tr:hover {
            background: #f7fafc;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 11px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4299e1;
            color: white;
        }

        .btn-primary:hover {
            background: #3182ce;
            box-shadow: 0 4px 12px rgba(66, 153, 225, 0.3);
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.3);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
            box-shadow: 0 4px 12px rgba(245, 101, 101, 0.3);
        }

        .alert {
            padding: 14px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid;
        }

        .alert.show {
            display: block;
        }

        .alert-info {
            background: #e6f7ff;
            color: #003d66;
            border-left-color: #0066cc;
        }

        .alert-success {
            background: #e6ffed;
            color: #003d1a;
            border-left-color: #00b366;
        }

        .alert-error {
            background: #ffe6e6;
            color: #660000;
            border-left-color: #ff0000;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0aec0;
        }

        .empty-state p {
            font-size: 1.05em;
        }

        .stats-badge {
            background: #edf2f7;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            color: #2d3748;
            font-weight: 500;
        }

        .row-actions {
            display: flex;
            gap: 6px;
        }

        .row-actions button {
            flex: 1;
            padding: 7px 12px;
            font-size: 0.8em;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 10px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .modal-content h2 {
            color: #1a365d;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .questions-list {
            margin-bottom: 30px;
        }

        .question-item {
            background: #f7fafc;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
        }

        .question-item span {
            color: #2d3748;
            font-weight: 500;
        }

        .question-item-actions {
            display: flex;
            gap: 8px;
        }

        .question-item-actions button {
            padding: 6px 12px;
            font-size: 0.8em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .question-item button.edit-btn {
            background: #4299e1;
            color: white;
        }

        .question-item button.edit-btn:hover {
            background: #3182ce;
        }

        .question-item button.delete-btn {
            background: #f56565;
            color: white;
        }

        .question-item button.delete-btn:hover {
            background: #e53e3e;
        }

        .add-question-form {
            background: #edf2f7;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .add-question-form .form-group {
            margin-bottom: 12px;
        }

        .add-question-form input {
            padding: 10px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            width: 100%;
            font-size: 0.95em;
        }

        .add-question-form button {
            width: 100%;
            padding: 10px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-question-form button:hover {
            background: #38a169;
        }

        .modal-close-btn {
            background: #e2e8f0;
            color: #2d3748;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            transition: all 0.2s;
        }

        .modal-close-btn:hover {
            background: #cbd5e0;
        }

        .header-actions {
            text-align: center;
            margin-bottom: 20px;
        }

        .manage-questions-btn {
            background: #4299e1;
            color: white;
            border: none;
            padding: 20px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .manage-questions-btn:hover {
            background: #3182ce;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .panel {
                padding: 25px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Weld & NDE Log</h1>
            <p>Inspection Data Entry System</p>
            <div class="header-actions">
                <button class="manage-questions-btn" id="manageQuestionsBtn">Manage Questions</button>
            </div>
        </header>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <h2>Manage Questions</h2>
                
                <div class="add-question-form">
                    <h3 style="margin-bottom: 15px; color: #1a365d; font-size: 1em;">Add New Question</h3>
                    <div class="form-group">
                        <input type="text" id="newQuestionInput" placeholder="Enter new question">
                    </div>
                    <button id="addQuestionBtn">Add Question</button>
                </div>

                <h3 style="margin-bottom: 15px; color: #1a365d; font-size: 1em;">Current Questions</h3>
                <div class="questions-list" id="questionsList"></div>

                <button class="modal-close-btn" id="closeSettingsBtn">Close</button>
            </div>
        </div>

        <div id="alert" class="alert"></div>

        <div class="main-content" id="mainContent">
            <!-- Left Panel: Form Input -->
            <div class="panel">
                <h2>Data Entry Form</h2>
                <div class="stats-badge" id="statsDiv">
                    Entry <span id="currentRow">1</span> of ∞
                </div>

                <form id="dataForm">
                    <div id="formFields"></div>
                    <div class="button-group">
                        <button type="submit" class="btn-primary" id="submitBtn">Save & Next</button>
                        <button type="reset" class="btn-secondary">Clear</button>
                        <button type="button" class="btn-secondary" id="cancelBtn" style="display: none;">Cancel Edit</button>
                    </div>
                </form>
            </div>

            <!-- Right Panel: Grid View -->
            <div class="panel">
                <h2>Data Grid</h2>
                <div class="stats-badge">
                    Total entries: <strong id="entryCount">0</strong>
                </div>
                <div id="gridContainer" class="grid-container">
                    <div class="empty-state">
                        <p>Start entering data to see entries here</p>
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn-success" id="exportBtn" style="display: none;">Download Excel</button>
                    <button class="btn-success" id="exportWithPdfsBtn" style="display: none;">Download with PDFs</button>
                </div>
                
                <!-- Log Management Section -->
                <div id="logManagement" style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 6px; display: none;">
                    <div style="margin-bottom: 12px;">
                        <label style="display: block; margin-bottom: 8px; color: #2d3748; font-weight: 500; font-size: 0.9em;">Select Log:</label>
                        <select id="logSelector" style="width: 100%; padding: 8px 10px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 0.9em;">
                            <option value="">-- Create New Log --</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                        <button class="btn-primary" id="saveLogBtn" style="flex: 1; min-width: 100px; font-size: 0.9em;">Save Log</button>
                        <button class="btn-secondary" id="newLogBtn" style="flex: 1; min-width: 100px; font-size: 0.9em;">New Log</button>
                        <button class="btn-danger" id="deleteLogBtn" style="flex: 1; min-width: 100px; font-size: 0.9em; display: none;">Delete Log</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@latest/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
    <script>
        // Default questions from the Excel file top row
        const defaultHeaders = [
            "Subsystem #",
            "CWA #",
            "Isometric #",
            "Weld Number",
            "Weld Type",
            "Piping OD (in)",
            "Pipe Thickness (mm)",
            "Material Grade",
            "Line Class Designation",
            "Code of Construction",
            "WPS #",
            "Welder ID",
            "Weld Date",
            "VT Date",
            "VT By",
            "NDE",
            "RT Report Number",
            "RT Date",
            "NDE Pass/Fail",
            "MT / LPI Report Number",
            "Hydrotest Number",
            "Weld Inspection Uploaded to T/O",
            "NDE Uploaded to T/O",
            "Coating Report No.",
            "Comments"
        ];
        
        let headers = [];
        let data = [];
        let editingIndex = null;
        let editingQuestionIndex = null;
        let db = null;
        
        // Initialize IndexedDB for file storage
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('WeldLogDB', 1);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('files')) {
                        database.createObjectStore('files', { keyPath: 'id' });
                    }
                };
            });
        }

        // Store file in IndexedDB
        function storeFile(file, rowId, fieldIndex) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const transaction = db.transaction(['files'], 'readwrite');
                    const store = transaction.objectStore('files');
                    const fileData = {
                        id: `${rowId}_${fieldIndex}`,
                        name: file.name,
                        data: reader.result,
                        type: file.type,
                        timestamp: new Date().toISOString()
                    };
                    store.put(fileData);
                    transaction.oncomplete = () => resolve(fileData.id);
                    transaction.onerror = () => reject(transaction.error);
                };
                reader.readAsArrayBuffer(file);
            });
        }

        // Get file from IndexedDB
        function getFile(fileId) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['files'], 'readonly');
                const store = transaction.objectStore('files');
                const request = store.get(fileId);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // Download file from IndexedDB
        window.downloadFile = async function(fileId) {
            try {
                const fileData = await getFile(fileId);
                if (!fileData) {
                    showAlert('File not found', 'error');
                    return;
                }
                const blob = new Blob([fileData.data], { type: fileData.type });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = fileData.name;
                link.click();
                URL.revokeObjectURL(url);
            } catch (error) {
                showAlert('Error downloading file: ' + error.message, 'error');
            }
        }

        const formFields = document.getElementById('formFields');
        const dataForm = document.getElementById('dataForm');
        const gridContainer = document.getElementById('gridContainer');
        const exportBtn = document.getElementById('exportBtn');
        const exportWithPdfsBtn = document.getElementById('exportWithPdfsBtn');
        const alert = document.getElementById('alert');
        
        // Log management elements
        const logManagement = document.getElementById('logManagement');
        const logSelector = document.getElementById('logSelector');
        const saveLogBtn = document.getElementById('saveLogBtn');
        const newLogBtn = document.getElementById('newLogBtn');
        const deleteLogBtn = document.getElementById('deleteLogBtn');
        let currentLogId = null;
        const currentRow = document.getElementById('currentRow');
        const entryCount = document.getElementById('entryCount');
        const mainContent = document.getElementById('mainContent');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        
        // Modal elements
        const manageQuestionsBtn = document.getElementById('manageQuestionsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const addQuestionBtn = document.getElementById('addQuestionBtn');
        const newQuestionInput = document.getElementById('newQuestionInput');
        const questionsList = document.getElementById('questionsList');

        // Load questions from localStorage or use defaults
        function loadQuestions() {
            const saved = localStorage.getItem('weld_log_questions');
            headers = saved ? JSON.parse(saved) : [...defaultHeaders];
        }

        // Save questions to localStorage
        function saveQuestions() {
            localStorage.setItem('weld_log_questions', JSON.stringify(headers));
        }

        // Load all saved logs from localStorage
        function loadSavedLogs() {
            const saved = localStorage.getItem('weld_logs');
            return saved ? JSON.parse(saved) : [];
        }

        // Save logs list to localStorage
        function saveLogs(logs) {
            localStorage.setItem('weld_logs', JSON.stringify(logs));
        }

        // Load data for a specific log
        function loadLogData(logId) {
            if (!logId) {
                data = [];
                return;
            }
            const saved = localStorage.getItem(`weld_log_data_${logId}`);
            data = saved ? JSON.parse(saved) : [];
            currentLogId = logId;
        }

        // Save current log data to localStorage
        function saveLogData() {
            if (!currentLogId) return;
            localStorage.setItem(`weld_log_data_${currentLogId}`, JSON.stringify(data));
        }

        // Render log selector dropdown
        function renderLogSelector() {
            const logs = loadSavedLogs();
            const options = '<option value="">-- Create New Log --</option>' +
                logs.map(log => `<option value="${log.id}">${log.name}</option>`).join('');
            logSelector.innerHTML = options;
            if (currentLogId) {
                logSelector.value = currentLogId;
            }
            deleteLogBtn.style.display = currentLogId ? 'inline-block' : 'none';
        }

        // Initialize app on load
        async function initializeApp() {
            try {
                await initDB();
                loadQuestions();
                renderForm();
                renderLogSelector();
                logManagement.style.display = 'block';
                exportBtn.style.display = 'inline-block';
                exportWithPdfsBtn.style.display = 'inline-block';
                renderGrid();
                dataForm.reset();
                dataForm.elements[0]?.focus();
                showAlert('Ready to start! Enter inspection data below.', 'success');
            } catch (error) {
                showAlert('Error initializing app: ' + error.message, 'error');
            }
        }

        // Open/Close modal
        manageQuestionsBtn.addEventListener('click', () => {
            renderQuestionsList();
            settingsModal.classList.add('show');
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsModal.classList.remove('show');
            newQuestionInput.value = '';
            editingQuestionIndex = null;
        });

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('show');
            }
        });

        // Add new question
        addQuestionBtn.addEventListener('click', () => {
            const value = newQuestionInput.value.trim();
            if (!value) {
                showAlert('Please enter a question', 'error');
                return;
            }

            if (editingQuestionIndex !== null) {
                // Update existing question
                headers[editingQuestionIndex] = value;
                editingQuestionIndex = null;
                addQuestionBtn.textContent = 'Add Question';
            } else {
                // Add new question
                headers.push(value);
            }

            saveQuestions();
            saveLogData();
            newQuestionInput.value = '';
            renderQuestionsList();
            renderForm();
            renderGrid();
            showAlert('Questions updated successfully.', 'success');
        });

        // Render questions list in modal
        function renderQuestionsList() {
            questionsList.innerHTML = '';
            headers.forEach((question, idx) => {
                const item = document.createElement('div');
                item.className = 'question-item';
                item.innerHTML = `
                    <span>${idx + 1}. ${question}</span>
                    <div class="question-item-actions">
                        <button class="edit-btn" onclick="editQuestion(${idx})">Edit</button>
                        <button class="delete-btn" onclick="deleteQuestion(${idx})">Delete</button>
                    </div>
                `;
                questionsList.appendChild(item);
            });
        }

        // Edit question
        window.editQuestion = function(idx) {
            editingQuestionIndex = idx;
            newQuestionInput.value = headers[idx];
            addQuestionBtn.textContent = 'Update Question';
            newQuestionInput.focus();
        };

        // Delete question
        window.deleteQuestion = function(idx) {
            if (confirm('Delete this question? All data in this column will be affected.')) {
                headers.splice(idx, 1);
                // Remove data from all entries for this column
                data.forEach(row => {
                    const keys = Object.keys(row);
                    if (keys[idx]) {
                        delete row[keys[idx]];
                    }
                });
                saveQuestions();
                saveLogData();
                renderQuestionsList();
                renderForm();
                renderGrid();
                showAlert('Question deleted.', 'success');
            }
        };



        // Render form fields
        function renderForm() {
            formFields.innerHTML = '';
            headers.forEach((header, idx) => {
                const div = document.createElement('div');
                div.className = 'form-group';
                div.innerHTML = `
                    <label for="field-${idx}">${header}</label>
                    <div class="input-group">
                        <input type="text" id="field-${idx}" name="field-${idx}" class="text-input" placeholder="Enter response" autofocus=${idx === 0 ? 'true' : 'false'}>
                        <div class="file-upload">
                            <input type="file" id="file-${idx}" accept=".pdf" onchange="handleFileSelect(this, ${idx})">
                            <div id="file-name-${idx}" class="file-name"></div>
                        </div>
                    </div>
                `;
                formFields.appendChild(div);
            });
        }

        // Handle file selection
        window.handleFileSelect = function(input, fieldIdx) {
            const file = input.files[0];
            const fileNameDiv = document.getElementById(`file-name-${fieldIdx}`);
            
            if (file && file.type === 'application/pdf') {
                fileNameDiv.textContent = `✓ ${file.name}`;
            } else if (file) {
                showAlert('Please select a PDF file', 'error');
                input.value = '';
                fileNameDiv.textContent = '';
            } else {
                fileNameDiv.textContent = '';
            }
        };

        // Render grid
        function renderGrid() {
            entryCount.textContent = data.length;

            if (data.length === 0) {
                gridContainer.innerHTML = '<div class="empty-state"><p>📝 Answer the questions to add entries</p></div>';
                return;
            }

            let html = '<table><thead><tr>';
            headers.forEach(header => {
                html += `<th>${header}</th>`;
            });
            html += '<th style="min-width: 100px;">Actions</th></tr></thead><tbody>';

            data.forEach((row, rowIdx) => {
                html += '<tr>';
                headers.forEach(header => {
                    const fileId = row[`${header}_file`];
                    const value = row[header] || '';
                    
                    if (fileId) {
                        // Show file with download link
                        html += `<td><button class="btn-primary" style="padding: 6px 12px; font-size: 0.85em;" type="button" onclick="downloadFile('${fileId}')">📄 ${value}</button></td>`;
                    } else {
                        html += `<td>${value}</td>`;
                    }
                });
                html += `<td><div class="row-actions"><button class="btn-secondary" type="button" onclick="editRow(${rowIdx})">Edit</button><button class="btn-danger" type="button" onclick="deleteRow(${rowIdx})">Delete</button></div></td>`;
                html += '</tr>';
            });

            html += '</tbody></table>';
            gridContainer.innerHTML = html;
        }

        // Form submit
        dataForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const row = {};
            let hasAnyData = false;
            const rowId = editingIndex !== null ? editingIndex : data.length;
            
            for (let idx = 0; idx < headers.length; idx++) {
                const header = headers[idx];
                const textInput = document.getElementById(`field-${idx}`);
                const fileInput = document.getElementById(`file-${idx}`);
                
                let value = textInput.value.trim();
                
                // Handle file upload
                if (fileInput.files.length > 0) {
                    try {
                        const fileId = await storeFile(fileInput.files[0], rowId, idx);
                        row[`${header}_file`] = fileId;
                        row[header] = fileInput.files[0].name;
                        hasAnyData = true;
                    } catch (error) {
                        showAlert('Error uploading file: ' + error.message, 'error');
                        return;
                    }
                } else if (value) {
                    row[header] = value;
                    hasAnyData = true;
                } else {
                    row[header] = 'N/A';
                }
            }

            if (!hasAnyData) {
                showAlert('Please fill in at least one field or upload a file', 'error');
                return;
            }

            // If editing, update the existing row
            if (editingIndex !== null) {
                data[editingIndex] = row;
                editingIndex = null;
                submitBtn.textContent = 'Save & Next';
                cancelBtn.style.display = 'none';
                showAlert('Entry updated successfully.', 'success');
            } else {
                // Otherwise add a new row
                data.push(row);
                showAlert(`Entry ${data.length} saved. Ready for entry ${data.length + 1}.`, 'success');
            }

            saveLogData();
            dataForm.reset();
            renderGrid();
            currentRow.textContent = data.length + 1;
            
            // Focus first field
            document.getElementById('field-0')?.focus();
        });

        // Cancel edit
        cancelBtn.addEventListener('click', function() {
            editingIndex = null;
            dataForm.reset();
            renderGrid();
            submitBtn.textContent = '✅ Save & Next';
            cancelBtn.style.display = 'none';
            currentRow.textContent = data.length + 1;
            document.getElementById('field-0')?.focus();
            showAlert('Edit cancelled', 'info');
        });

        // Delete row
        window.deleteRow = function(idx) {
            if (confirm('Delete this entry?')) {
                data.splice(idx, 1);
                saveLogData();
                renderGrid();
                currentRow.textContent = data.length + 1;
                showAlert('Entry deleted', 'success');
            }
        };

        // Edit row
        window.editRow = function(idx) {
            const row = data[idx];
            editingIndex = idx;
            headers.forEach((header, hIdx) => {
                const input = document.getElementById(`field-${hIdx}`);
                // Show empty if the value is "N/A"
                input.value = (row[header] === 'N/A') ? '' : (row[header] || '');
            });
            
            submitBtn.textContent = 'Update Entry';
            cancelBtn.style.display = 'inline-block';
            currentRow.textContent = idx + 1;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('field-0')?.focus();
            showAlert('Editing entry #' + (idx + 1) + '. Save changes to update.', 'info');
        };

        // Export to Excel
        exportBtn.addEventListener('click', function() {
            if (data.length === 0) {
                showAlert('No data to export', 'error');
                return;
            }

            try {
                console.log('=== EXPORT STARTED ===');
                console.log('Data entries:', data.length);
                console.log('XLSX available:', typeof XLSX !== 'undefined');
                
                // Wait for XLSX to load if not ready
                if (typeof XLSX === 'undefined') {
                    console.log('XLSX loading, waiting...');
                    showAlert('Excel library loading... Please wait.', 'info');
                    
                    // Retry after 2 seconds
                    setTimeout(() => {
                        console.log('XLSX available now:', typeof XLSX !== 'undefined');
                        if (typeof XLSX !== 'undefined') {
                            performExport();
                        } else {
                            showAlert('Excel library failed to load. Try refreshing the page.', 'error');
                        }
                    }, 2000);
                    return;
                }

                performExport();
                
                function performExport() {
                    // Build data array
                    const worksheet_data = [];
                    worksheet_data.push(headers);
                    
                    data.forEach((row, idx) => {
                        const rowArray = headers.map(header => row[header] || 'N/A');
                        worksheet_data.push(rowArray);
                    });
                    
                    console.log('Total rows to export:', worksheet_data.length);
                    
                    // Create workbook and worksheet
                    const workbook = XLSX.utils.book_new();
                    console.log('Workbook created');
                    
                    const worksheet = XLSX.utils.aoa_to_sheet(worksheet_data);
                    console.log('Worksheet created from array');
                    
                    // Set column widths
                    worksheet['!cols'] = headers.map(() => ({ wch: 20 }));
                    
                    // Style header row - yellow background
                    for (let col = 0; col < headers.length; col++) {
                        const cellAddress = XLSX.utils.encode_cell({ r: 0, c: col });
                        if (!worksheet[cellAddress]) {
                            worksheet[cellAddress] = { t: 's', v: headers[col] };
                        }
                        worksheet[cellAddress].s = {
                            fill: { fgColor: { rgb: 'FFFF00' }, patternType: 'solid' },
                            font: { bold: true, color: { rgb: '000000' } },
                            alignment: { horizontal: 'center', vertical: 'center', wrapText: true }
                        };
                    }
                    console.log('Header styling applied');
                    
                    // Add sheet to workbook
                    XLSX.utils.book_append_sheet(workbook, worksheet, 'Weld Log');
                    console.log('Sheet added to workbook');
                    
                    // Generate filename with timestamp
                    const timestamp = new Date().toISOString().slice(0, 10);
                    const filename = `Weld-NDE-Log-${timestamp}.xlsx`;
                    console.log('Writing file:', filename);
                    
                    // Write the file
                    XLSX.writeFile(workbook, filename);
                    console.log('=== EXPORT COMPLETED ===');
                    
                    showAlert(`Excel file "${filename}" downloaded successfully.`, 'success');
                }
                
            } catch (error) {
                console.error('=== EXPORT ERROR ===');
                console.error('Error message:', error.message);
                console.error('Error stack:', error.stack);
                showAlert('Export failed: ' + error.message, 'error');
            }
        });

        // Export with PDFs as ZIP
        exportWithPdfsBtn.addEventListener('click', async function() {
            if (data.length === 0) {
                showAlert('No data to export', 'error');
                return;
            }

            if (typeof JSZip === 'undefined') {
                showAlert('ZIP library loading... Please wait.', 'info');
                setTimeout(() => {
                    if (typeof JSZip !== 'undefined') {
                        performZipExport();
                    } else {
                        showAlert('ZIP library failed to load. Try refreshing the page.', 'error');
                    }
                }, 2000);
                return;
            }

            performZipExport();

            async function performZipExport() {
                try {
                    showAlert('Creating ZIP file with PDFs and links...', 'info');
                    
                    // Create ZIP
                    const zip = new JSZip();

                    // Collect PDF information first
                    const pdfLinks = {}; // Will store cell addresses with PDF links
                    const pdfFolder = zip.folder('PDFs');
                    let pdfCount = 0;
                    
                    for (let rowIdx = 0; rowIdx < data.length; rowIdx++) {
                        const row = data[rowIdx];
                        const rowFolder = pdfFolder.folder(`Row-${rowIdx + 1}`);
                        
                        for (let colIdx = 0; colIdx < headers.length; colIdx++) {
                            const header = headers[colIdx];
                            const fileId = row[`${header}_file`];
                            
                            if (fileId) {
                                try {
                                    const fileData = await getFile(fileId);
                                    if (fileData) {
                                        rowFolder.file(fileData.name, fileData.data);
                                        
                                        // Store the link info - use relative path that works in ZIP
                                        const excelRowIdx = rowIdx + 1; // +1 for header row
                                        const cellAddress = XLSX.utils.encode_cell({ r: excelRowIdx, c: colIdx });
                                        pdfLinks[cellAddress] = {
                                            fileName: fileData.name,
                                            path: `PDFs/Row-${rowIdx + 1}/${fileData.name}`
                                        };
                                        pdfCount++;
                                    }
                                } catch (err) {
                                    console.error(`Error adding PDF for ${header}:`, err);
                                }
                            }
                        }
                    }

                    // Create Excel file with hyperlinks
                    const worksheet_data = [];
                    worksheet_data.push(headers);
                    
                    data.forEach((row, idx) => {
                        const rowArray = headers.map(header => {
                            const textValue = row[header] || 'N/A';
                            // Return plain value; will add hyperlink styling after
                            return textValue;
                        });
                        worksheet_data.push(rowArray);
                    });
                    
                    const workbook = XLSX.utils.book_new();
                    const worksheet = XLSX.utils.aoa_to_sheet(worksheet_data);
                    worksheet['!cols'] = headers.map(() => ({ wch: 25 }));
                    
                    // Style header row - yellow background
                    for (let col = 0; col < headers.length; col++) {
                        const cellAddress = XLSX.utils.encode_cell({ r: 0, c: col });
                        if (!worksheet[cellAddress]) {
                            worksheet[cellAddress] = { t: 's', v: headers[col] };
                        }
                        worksheet[cellAddress].s = {
                            fill: { fgColor: { rgb: 'FFFF00' }, patternType: 'solid' },
                            font: { bold: true, color: { rgb: '000000' } },
                            alignment: { horizontal: 'center', vertical: 'center', wrapText: true }
                        };
                    }
                    
                    // Add hyperlinks to cells with PDFs
                    for (const cellAddress in pdfLinks) {
                        const linkInfo = pdfLinks[cellAddress];
                        const cell = worksheet[cellAddress];
                        
                        if (cell) {
                            // Create proper hyperlink structure for XLSX
                            const fileName = linkInfo.fileName;
                            
                            // Store hyperlink with relative path that works in ZIP
                            cell.l = { 
                                Target: linkInfo.path,
                                Tooltip: fileName
                            };
                            
                            // Keep the original text but style as hyperlink
                            cell.t = 's'; // String type
                            if (!cell.v) {
                                cell.v = fileName;
                            }
                            
                            // Style as blue underlined link
                            cell.s = {
                                font: { 
                                    color: { rgb: '0563C1' }, 
                                    underline: 'single'
                                },
                                alignment: { wrapText: true }
                            };
                        }
                    }
                    
                    XLSX.utils.book_append_sheet(workbook, worksheet, 'Weld Log');
                    
                    // Write Excel to blob
                    const excelBlob = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
                    zip.file('Weld-NDE-Log.xlsx', excelBlob);
                    
                    // Generate ZIP file
                    const timestamp = new Date().toISOString().slice(0, 10);
                    const zipBlob = await zip.generateAsync({ type: 'blob' });
                    const url = URL.createObjectURL(zipBlob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `Weld-NDE-Log-${timestamp}.zip`;
                    link.click();
                    URL.revokeObjectURL(url);
                    
                    showAlert(`ZIP file downloaded with ${pdfCount} PDF(s) as clickable links.`, 'success');
                } catch (error) {
                    console.error('ZIP export error:', error);
                    showAlert('Export failed: ' + error.message, 'error');
                }
            }
        });

        // Save Log
        saveLogBtn.addEventListener('click', function() {
            if (data.length === 0) {
                showAlert('No data to save. Enter some records first.', 'error');
                return;
            }

            if (currentLogId) {
                // Save to existing log
                saveLogData();
                showAlert('Log saved successfully!', 'success');
            } else {
                // Create new log with name
                const logName = prompt('Enter a name for this log (e.g., "Weld Batch 001"):', `Log - ${new Date().toLocaleDateString()}`);
                if (!logName) {
                    showAlert('Save cancelled', 'info');
                    return;
                }

                const logId = Date.now().toString();
                currentLogId = logId;
                saveLogData();
                const logs = loadSavedLogs();
                logs.push({
                    id: logId,
                    name: logName,
                    timestamp: new Date().toISOString(),
                    entryCount: data.length
                });
                saveLogs(logs);
                renderLogSelector();
                showAlert(`Log "${logName}" saved with ${data.length} entries!`, 'success');
            }
        });

        // New Log
        newLogBtn.addEventListener('click', function() {
            if (data.length > 0) {
                if (!confirm('You have unsaved data. Create a new log anyway?')) {
                    return;
                }
            }
            data = [];
            currentLogId = null;
            editingIndex = null;
            dataForm.reset();
            renderGrid();
            currentRow.textContent = '1';
            submitBtn.textContent = '✅ Save & Next';
            cancelBtn.style.display = 'none';
            document.getElementById('field-0')?.focus();
            renderLogSelector();
            showAlert('New log created. Start entering data!', 'success');
        });

        // Delete Log
        deleteLogBtn.addEventListener('click', function() {
            if (!currentLogId) return;
            if (!confirm('Delete this log? This action cannot be undone.')) {
                return;
            }
            const logs = loadSavedLogs();
            const updatedLogs = logs.filter(log => log.id !== currentLogId);
            saveLogs(updatedLogs);
            localStorage.removeItem(`weld_log_data_${currentLogId}`);
            data = [];
            currentLogId = null;
            renderLogSelector();
            renderGrid();
            currentRow.textContent = '1';
            dataForm.reset();
            showAlert('Log deleted', 'success');
        });

        // Switch Log
        logSelector.addEventListener('change', function() {
            if (!this.value) {
                // Create new log option selected
                newLogBtn.click();
                return;
            }

            if (data.length > 0 && currentLogId !== this.value) {
                if (!confirm('Switch logs without saving? You have unsaved data.')) {
                    renderLogSelector();
                    return;
                }
            }

            loadLogData(this.value);
            editingIndex = null;
            dataForm.reset();
            renderGrid();
            currentRow.textContent = data.length + 1;
            submitBtn.textContent = '✅ Save & Next';
            cancelBtn.style.display = 'none';
            renderLogSelector();
            showAlert(`Log loaded with ${data.length} entries`, 'success');
        });

        // Show alert
        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;
            setTimeout(() => {
                alert.classList.remove('show');
            }, 4000);
        }

        // Start the app
        initializeApp();
    </script>
</body>
</html>
